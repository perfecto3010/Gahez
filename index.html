<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة لهاليبو 🔥</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #121212;
            --primary-red: #e63946;
            --flame-orange: #fca311;
            --wife-color: #ff4d6d;
            --husband-color: #0077b6;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: var(--bg-dark);
            color: var(--text-light);
            text-align: center;
            padding: 20px;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Instructions Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
        }

        .modal {
            background: #222;
            padding: 25px;
            border-radius: 25px;
            border: 2px solid var(--flame-orange);
            max-width: 400px;
        }

        /* Game Elements */
        #card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 40px 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 85%;
            max-width: 400px;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 30px;
            line-height: 1.6;
            color: #fff;
        }

        button {
            padding: 15px 60px;
            font-size: 1.4rem;
            font-weight: 900;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, var(--primary-red), var(--flame-orange));
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.4);
            transition: all 0.2s ease;
        }

        button:active { transform: scale(0.92); filter: brightness(1.2); }

        #turn-indicator {
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: 900;
            padding: 5px 20px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }

        #progress { font-size: 0.9rem; margin-top: 20px; opacity: 0.5; font-weight: bold; }
        
        .fire-icon { font-size: 2rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="modal">
            <div class="fire-icon">🔥</div>
            <h2>طريقة اللعب</h2>
            <p>لعبة لهاليبو مخصصة للمتزوجين فقط. ستظهر تحديات أو أسئلة بالتبادل بين الزوج والزوجة.</p>
            <ul style="text-align: right; margin-bottom: 25px;">
                <li>اضغط على "الدور التالي" للبدء.</li>
                <li>تغير لون الشاشة يحدد من عليه الدور.</li>
                <li>الصراحة والجرأة هما أساس اللعبة!</li>
            </ul>
            <button onclick="closeInstructions()">يلا نبدأ!</button>
        </div>
    </div>

    <div class="fire-icon">🔥🔥🔥</div>
    <div id="turn-indicator">جاهزين؟</div>
    <div id="card">اضغط على الزر لبدء التحدي الأول</div>
    <button onclick="nextTurn()">الدور التالي</button>
    <div id="progress"></div>

    <script>
        const records = [
            "احكي لي سر أول مرة أعرفه عنك.",
            "إيه أجمل ذكرى عشناها مع بعض من وجهة نظرك؟",
            "اعمل لمراتك مساج لمدة دقيقة.",
            "إيه أكتر حاجة بتعجبك في شكلي النهاردة؟",
            "لو هنختار مكان نسافر فيه بكرة، تحبي يكون فين؟",
            "إيه كان أول انطباع عني لما شفتني؟",
            "اوصفني في تلات كلمات بس.",
            "لو رجع بينا الزمن، كنت هتغير إيه في يوم فرحنا؟"
        ];

        let state = JSON.parse(localStorage.getItem('gameState')) || {
            isWifeTurn: Math.random() < 0.5,
            usedIndices: []
        };

        const card = document.getElementById('card');
        const indicator = document.getElementById('turn-indicator');
        const progress = document.getElementById('progress');
        const body = document.body;
        const overlay = document.getElementById('overlay');

        // Show instructions only on first visit
        if (localStorage.getItem('hasSeenInstructions')) {
            overlay.style.display = 'none';
        }

        function closeInstructions() {
            overlay.style.display = 'none';
            localStorage.setItem('hasSeenInstructions', 'true');
        }

        function saveState() {
            localStorage.setItem('gameState', JSON.stringify(state));
        }

        function nextTurn() {
            if (state.usedIndices.length === records.length) {
                state.usedIndices = [];
                alert("خلصنا كل الكروت! هنبدأ من جديد 🔥");
            }

            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * records.length);
            } while (state.usedIndices.includes(randomIndex));

            state.usedIndices.push(randomIndex);
            card.innerText = records[randomIndex];
            state.isWifeTurn = !state.isWifeTurn;

            updateUI();
            saveState();
            
            if (window.navigator.vibrate) window.navigator.vibrate([50, 30, 50]);
        }

        function updateUI() {
            if (state.isWifeTurn) {
                indicator.innerText = "دور الزوجة 👸";
                body.style.backgroundColor = "var(--wife-color)";
            } else {
                indicator.innerText = "دور الزوج 🤴";
                body.style.backgroundColor = "var(--husband-color)";
            }
            progress.innerText = `تحدي رقم ${state.usedIndices.length} من أصل ${records.length}`;
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        if(state.usedIndices.length > 0) updateUI();
    </script>
</body>
</html>
